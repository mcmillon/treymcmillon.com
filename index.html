<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trey McMillon</title>
<link rel="stylesheet" href="css/style.css">
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden; /* prevents accidental scroll bounce before we navigate */
  }

  .splash {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    cursor: pointer;
    transition: opacity 0.4s ease;
}

.splash.is-leaving {
    opacity: 0;
}

.splash-hint.is-leaving {
    opacity: 0;
}

  .splash img {
    width: min(46vw, 420px);
    height: auto;
    opacity: 0;
    animation: fade-in 0.6s ease forwards 0.15s;
  }

  .splash-hint {
    position: fixed;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    animation: fade-in 0.6s ease forwards 0.5s;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  @media (max-width: 640px) {
    .splash img { width: 62vw; }
  }
</style>
</head>
<body>

<a class="splash" href="projects.html" aria-label="Enter site" id="splash">
  <img src="images/treymcmillon.png" alt="Trey McMillon">
</a>
<div class="splash-hint" id="hint">Click or scroll to enter</div>

<script>
  let entered = false;
  const splash = document.getElementById("splash");
  const hint = document.getElementById("hint");

  function enter(e) {
    if (entered) return;
    entered = true;
    if (e) e.preventDefault();
    splash.classList.add("is-leaving");
    hint.classList.add("is-leaving");
    setTimeout(function () {
      window.location.href = "projects.html";
    }, 400);
  }

  splash.addEventListener("click", enter);
  window.addEventListener("wheel", enter, { passive: true });
  window.addEventListener("touchmove", enter, { passive: true });
</script>

</body>
</html>
